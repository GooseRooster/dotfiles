# Top-level settings - always apply, every profile inherits these
vo=gpu-next
gpu-api=vulkan
hwdec=vaapi
hwdec-codecs=all
deband=yes
dither-depth=auto
panscan=0.8
pipewire-buffer=50

# SDR default - only this changes per profile
target-colorspace-hint-mode=off

[hdr]
profile-cond=p["video-params/primaries"] == "bt.2020"
profile-restore=copy
target-colorspace-hint-mode=source
