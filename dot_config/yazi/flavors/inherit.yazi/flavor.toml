# vim:fileencoding=utf-8:foldmethod=marker
# "inherit" flavor — pulls every color straight from the terminal's 16-slot ANSI
# palette, so swapping a Tinty/base16 scheme retints Yazi live (no restart), the
# same way it retints any other program that just emits SGI escape codes.
#
# Color roles are spread across the full palette (à la btop's tty mode) instead
# of concentrating on magenta, so each base16 slot (base08-base0F) actually reads
# as a distinct accent rather than the whole UI taking on a single scheme hue.
#
# NAMING TRAP: ratatui's color parser (which yazi uses) names the plain ANSI
# slots differently than you'd expect — "gray" is ANSI 7 (base05, the normal
# muted foreground), while "white" is ANSI 15 (base07, true bright white).
# Use "gray" for base05-intent text; "white" will look noticeably brighter
# than the rest of the scheme.

# : Manager [[[

[mgr]
cwd = { fg = "cyan" }

# Find
find_keyword  = { fg = "light_yellow", bold = true, italic = true, underline = true }
find_position = { fg = "light_magenta", bold = true, italic = true }

# Marker
marker_copied   = { fg = "light_green",  bg = "light_green" }
marker_cut      = { fg = "light_red",    bg = "light_red" }
marker_marked   = { fg = "light_cyan",   bg = "light_cyan" }
marker_selected = { fg = "light_yellow", bg = "light_yellow" }

# Count
count_copied   = { fg = "black", bg = "green" }
count_cut      = { fg = "black", bg = "red" }
count_selected = { fg = "black", bg = "yellow" }

# Border
border_style = { fg = "light_blue" }

# : ]]]


# : Indicator [[[

[indicator]
parent  = { reversed = true }
current = { reversed = true }
preview = { underline = true }

# : ]]]


# : Status [[[

[status]
overall   = {}
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "gray",     bg = "reset" }
progress_error  = { fg = "light_red", bg = "red" }

# Permissions
perm_type  = { fg = "light_blue" }
perm_write = { fg = "red" }
perm_exec  = { fg = "light_green" }
perm_read  = { fg = "light_yellow" }
perm_sep   = { fg = "cyan" }

# : ]]]


# : Mode [[[

[mode]

normal_main = { bg = "blue", fg = "black", bold = true }
normal_alt  = { bg = "dark_gray", fg = "blue" }

select_main = { bg = "light_magenta", fg = "black", bold = true }
select_alt  = { bg = "dark_gray", fg = "light_magenta" }

unset_main  = { bg = "light_red", fg = "black", bold = true }
unset_alt   = { bg = "dark_gray", fg = "red" }

# : ]]]


# : Input [[[

[input]
border   = { fg = "blue" }
title    = {}
value    = { fg = "gray" }
selected = { reversed = true }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "black", bold = true, bg = "blue" }
inactive  = { fg = "light_blue", bg = "reset" }
sep_inner = { open = "", close = "" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "blue", bg = "black" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "blue" }
title   = {}
hovered = { fg = "light_magenta", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask            = { bg = "reset" }
cand            = { fg = "cyan" }
rest            = { fg = "dark_gray" }
desc            = { fg = "gray" }
separator       = " ▶ "
separator_style = { fg = "dark_gray" }

# : ]]]


# : Pick [[[

[pick]
active   = { fg = "light_magenta" }
border   = { fg = "light_blue" }
inactive = { fg = "gray" }

# : ]]]


# : Spotter [[[

[spot]
border   = { fg = "blue" }
title    = { fg = "blue" }
tbl_col  = { fg = "gray" }
tbl_cell = { fg = "gray", bg = "reset" }

# : ]]]


# : Help [[[

[help]
on      = { fg = "cyan" }
run     = { fg = "light_magenta" }
hovered = { reversed = true, bold = true }
footer  = { fg = "black", bg = "gray" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "cyan" }
title_warn  = { fg = "yellow" }
title_error = { fg = "light_red" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "cyan" },

    # Media
    { mime = "{audio,video}/*", fg = "light_yellow" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "light_magenta" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "light_green" },

    # Special files
    { mime = "*", is = "orphan", fg = "light_red", bg = "red" },
    { mime = "application/*exec*", fg = "green" },

    # Fallback
    { url = "*",  fg = "gray" },
    { url = "*/", fg = "blue" },
]

# : ]]]

