# vim:fileencoding=utf-8:foldmethod=marker
# "inherit" flavor ÔÇö pulls every color straight from the terminal's 16-slot ANSI
# palette, so swapping a Tinty/base16 scheme retints Yazi live (no restart), the
# same way it retints any other program that just emits SGI escape codes.
#
# Color roles are spread across the full palette (├á la btop's tty mode) instead
# of concentrating on magenta, so each base16 slot (base08-base0F) actually reads
# as a distinct accent rather than the whole UI taking on a single scheme hue.

# : Manager [[[

[mgr]
cwd = { fg = "cyan" }

# Find
find_keyword  = { fg = "light_red", bold = true, italic = true, underline = true }
find_position = { fg = "light_magenta", bold = true, italic = true }

# Marker
marker_copied   = { fg = "light_green",  bg = "light_green" }
marker_cut      = { fg = "light_red",    bg = "light_red" }
marker_marked   = { fg = "light_cyan",   bg = "light_cyan" }
marker_selected = { fg = "light_yellow", bg = "light_yellow" }

# Count
count_copied   = { fg = "white", bg = "green" }
count_cut      = { fg = "white", bg = "red" }
count_selected = { fg = "black", bg = "yellow" }

# Border
border_style = { fg = "dark_gray" }

# : ]]]


# : Status [[[

[status]
overall   = {}
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "green",  bg = "reset" }
progress_error  = { fg = "yellow", bg = "red" }

# Permissions
perm_type  = { fg = "green" }
perm_write = { fg = "red" }
perm_exec  = { fg = "cyan" }
perm_read  = { fg = "yellow" }
perm_sep   = { fg = "dark_gray" }

# : ]]]


# : Mode [[[

[mode]

normal_main = { bg = "blue", fg = "black", bold = true }
normal_alt  = { bg = "dark_gray", fg = "blue" }

select_main = { bg = "red", fg = "black", bold = true }
select_alt  = { bg = "dark_gray", fg = "red" }

unset_main  = { bg = "yellow", fg = "black", bold = true }
unset_alt   = { bg = "dark_gray", fg = "yellow" }

# : ]]]


# : Input [[[

[input]
border   = { fg = "blue" }
title    = {}
value    = { fg = "white" }
selected = { reversed = true }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "black", bold = true, bg = "blue" }
inactive  = { fg = "white", bg = "reset" }
sep_inner = { open = "", close = "" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "blue", bg = "black" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "blue" }
title   = {}
hovered = { fg = "light_magenta", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask            = { bg = "reset" }
cand            = { fg = "cyan" }
rest            = { fg = "dark_gray" }
desc            = { fg = "white" }
separator       = " ÔûÂ "
separator_style = { fg = "dark_gray" }

# : ]]]


# : Spotter [[[

[spot]
border   = { fg = "blue" }
title    = { fg = "blue" }
tbl_col  = { fg = "white" }
tbl_cell = { fg = "white", bg = "reset" }

# : ]]]


# : Help [[[

[help]
on      = { fg = "cyan" }
run     = { fg = "light_magenta" }
hovered = { reversed = true, bold = true }
footer  = { fg = "black", bg = "white" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "green" }
title_warn  = { fg = "yellow" }
title_error = { fg = "light_red" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "yellow" },

    # Media
    { mime = "{audio,video}/*", fg = "magenta" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "red" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "cyan" },

    # Special files
    { mime = "*", is = "orphan", fg = "light_red", bg = "red" },
    { mime = "application/*exec*", fg = "green" },

    # Fallback
    { url = "*",  fg = "white" },
    { url = "*/", fg = "blue" },
]

# : ]]]

