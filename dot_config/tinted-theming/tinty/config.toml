[[items]]
path = "https://github.com/tinted-theming/tinted-shell"
name = "tinted-shell"
themes-dir = "scripts"
hook = ". %f"
#yazi
[[items]]
path = "https://github.com/tinted-theming/tinted-yazi"
name = "tinted-yazi"
themes-dir = "flavors"
hook = '''
cp -f "$TINTY_THEME_FILE_PATH" "$HOME/.config/yazi/flavors/tinted-scheme.yazi/flavor.toml"
'''
#lazygit
[[items]]
name = "tinted-lazygit"
path = "https://github.com/tinted-theming/tinted-lazygit"
themes-dir = "themes"
supported-systems = ["base16"]

#Claude Code
[[items]]
name = "tinted-claude-code"
path = "https://github.com/tinted-theming/tinted-claude-code"
themes-dir = "scripts"
theme-file-extension = ".js"
supported-systems = ["base16", "base24", "tinted8"]
hook = "mkdir -p \"$HOME/.claude/themes\" && node \"$TINTY_THEME_FILE_PATH\" > \"$HOME/.claude/themes/tinty.json\""

#kitty
[[items]]
path = "https://github.com/tinted-theming/tinted-terminal"
name = "tinted-terminal"
themes-dir = "themes/kitty"
hook = "kill -USR1 $(pgrep -x kitty)"
supported-systems = ["base16", "base24"]
